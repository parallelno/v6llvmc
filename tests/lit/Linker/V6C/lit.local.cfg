import os

# Find workspace root (contains llvm-build/) by walking upward
d = os.path.dirname(os.path.abspath(__file__))
while d:
    if os.path.isdir(os.path.join(d, 'llvm-build', 'bin')):
        break
    parent = os.path.dirname(d)
    if parent == d:
        break
    d = parent

# %v6c_ld_script — points at the canonical V6C linker script.
config.substitutions.append((
    '%v6c_ld_script',
    os.path.join(d, 'clang', 'lib', 'Driver', 'ToolChains', 'V6C', 'v6c.ld'),
))
